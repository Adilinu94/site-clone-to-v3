name: Visual Diff — V3 vs V4

on:
  workflow_dispatch:
    inputs:
      v3_url:
        description: "V3 / Original URL"
        required: true
        default: "https://test4.nick-webdesign.de/"
      v4_url:
        description: "V4 / Converted URL"
        required: true
        default: "https://test4.nick-webdesign.de/home-v4-atomic-conversion/"
      viewports:
        description: "Viewports (comma-separated: desktop,tablet,mobile)"
        required: false
        default: "desktop,mobile"
      full_page:
        description: "Full-page screenshot (true) or above-fold only (false)"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  visual-diff:
    name: Screenshot & Pixel Diff
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run visual diff
        id: diff
        run: |
          node scripts/visual-diff.mjs \
            --v3-url "${{ github.event.inputs.v3_url }}" \
            --v4-url "${{ github.event.inputs.v4_url }}" \
            --viewports "${{ github.event.inputs.viewports }}" \
            --full-page "${{ github.event.inputs.full_page }}" \
            --output diff-output/ \
          | tee diff-result.json

          # Job summary
          node - << 'JS'
          const r = JSON.parse(require('fs').readFileSync('diff-result.json','utf8'));
          const lines = [`## Visual Diff Results`, `| Viewport | Match | Status |`, `|---|---|---|`];
          r.results.forEach(v => {
            const icon = parseFloat(v.matchPct) >= 85 ? '✅' : '⚠️';
            lines.push(`| ${v.label} | ${v.matchPct}% | ${icon} |`);
          });
          lines.push(``, `**V3:** ${r.v3_url}`, `**V4:** ${r.v4_url}`);
          require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n'));
          JS

      # Commit screenshots + report to diff-reports/ in main
      - name: Commit diff screenshots to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Move to persistent reports dir (overwrite latest)
          mkdir -p diff-reports/latest
          cp diff-output/*.png diff-reports/latest/
          cp diff-result.json diff-reports/latest/summary.json

          # Add metadata file so consumers know what was compared
          node - << 'JS'
          const meta = {
            generated: new Date().toISOString(),
            v3_url: "${{ github.event.inputs.v3_url }}",
            v4_url: "${{ github.event.inputs.v4_url }}",
            run_number: ${{ github.run_number }},
            run_id: "${{ github.run_id }}",
            files: require('fs').readdirSync('diff-output').filter(f => f.endsWith('.png'))
          };
          require('fs').writeFileSync('diff-reports/latest/meta.json', JSON.stringify(meta, null, 2));
          JS

          git add diff-reports/
          git diff --cached --quiet || git commit -m "diff-report: run #${{ github.run_number }} — ${{ github.event.inputs.v3_url }} vs ${{ github.event.inputs.v4_url }}"
          git push
